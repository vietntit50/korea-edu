spring:
  application:
    name: korea-edu-chatbot
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/korea_edu_chatbot}
    username: ${DATABASE_USERNAME:chatbot}
    password: ${DATABASE_PASSWORD:chatbot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

facebook:
  app-secret: ${FACEBOOK_APP_SECRET:}
  verify-token: ${FACEBOOK_VERIFY_TOKEN:change-me}
  page-access-token: ${FACEBOOK_PAGE_ACCESS_TOKEN:}
  graph-api-version: ${FACEBOOK_GRAPH_API_VERSION:v21.0}
  signature-verification-enabled: ${FACEBOOK_SIGNATURE_VERIFICATION_ENABLED:true}

messenger:
  send-enabled: ${MESSENGER_SEND_ENABLED:true}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{trace_id:-}]"
